<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PunJRoBoTech | Contact</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">PunJRoBoTech</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="cta">Contact</a>
  </div>
</div>

<section class="hero">
  <h1>Get in <span>Touch</span></h1>
  <p>Have questions or project ideas? Reach out and we’ll respond promptly.</p>
</section>

<section class="section">
  <h2>Contact Form</h2>
  <form class="contact-form">
    <div class="form-group">
      <input type="text" id="name" required>
      <label for="name">Your Name</label>
    </div>
    <div class="form-group">
      <input type="email" id="email" required>
      <label for="email">Email Address</label>
    </div>
    <div class="form-group">
      <textarea id="message" rows="5" required></textarea>
      <label for="message">Message</label>
    </div>
    <button type="submit">Send Message</button>
  </form>
</section>

<section class="section">
  <h2>Contact Info</h2>
  <div class="projects">
    <div class="card">
      <h3>Email</h3>
      <p>info@punjrobotech.com</p>
    </div>
    <div class="card">
      <h3>Phone</h3>
      <p>+91 9876543210</p>
    </div>
    <div class="card">
      <h3>Address</h3>
      <p>Karimpur, India</p>
    </div>
  </div>
</section>

<footer>
  © 2026 PunJRoBoTech | Intelligent Engineering
</footer>

</body>
</html>
